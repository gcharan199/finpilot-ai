name: CI

# Verifies the whole workspace: the pure-TS core packages (build/lint/typecheck/
# test, incl. the on-device receipt-parser tests — no key, no network) plus that
# the Expo app bundles via `expo export`.
#
# NOT covered here (by design — these need a real device, not CI): the on-device
# LLM path (`llama.rn` + a GGUF model), the on-device OCR module (ML Kit), and
# on-device UI/interaction testing (simulator/device). FinPilot is 100%
# on-device — there is no cloud step to test.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Do NOT pass a `version:` input here — `packageManager` in package.json
      # pins pnpm@9.15.9. Passing both triggers ERR_PNPM_BAD_PM_VERSION.
      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      # Build the library packages first so consumers resolve their dist/ +
      # types (lint's import resolver, typecheck, and the Expo bundle all need it).
      - name: Build packages
        run: pnpm -r --filter "./packages/*" build

      - name: Lint
        run: pnpm -r lint

      - name: Typecheck
        run: pnpm -r typecheck

      - name: Test
        run: pnpm -r test

      # The key proof the app compiles + bundles. iOS platform export; the
      # Hermes bytecode bundle is produced under apps/mobile/dist.
      - name: Expo export (bundle check)
        working-directory: apps/mobile
        run: pnpm exec expo export --platform ios
